<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Basic SEO -->
  <title>Aero Team — Modern Web Development & SaaS Solutions</title>
  <meta name="description" content="Aero Team builds fast, modern web apps, SaaS platforms, and digital products that help businesses grow and scale online." />
  <meta name="keywords" content="web development, SaaS, React, Vite, frontend, backend, Aero Team, custom websites, web apps" />
  <meta name="author" content="Aero Team" />
  <meta name="theme-color" content="#0f172a" />

  <!-- Canonical -->
  <link rel="canonical" href="https://aeroteam.vercel.app/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Open Graph (Facebook / WhatsApp) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Aero Team — Modern Web Development" />
  <meta property="og:description" content="We build scalable SaaS platforms and modern web apps for businesses." />
  <meta property="og:image" content="https://aeroteam.vercel.app/og-image.jpg" />
  <meta property="og:url" content="https://aeroteam.vercel.app/" />
  <meta property="og:site_name" content="Aero Team" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Aero Team — Modern Web Development" />
  <meta name="twitter:description" content="We build scalable SaaS platforms and modern web apps for businesses." />
  <meta name="twitter:image" content="https://aeroteam.vercel.app/og-image.jpg" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  [
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Aero Team",
      "url": "https://aeroteam.vercel.app",
      "description": "Aero Team builds fast, modern web apps, SaaS platforms, and digital products that help businesses grow and scale online.",
      "sameAs": []
    },
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Aero Team",
      "url": "https://aeroteam.vercel.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://aeroteam.vercel.app/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
  ]
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
